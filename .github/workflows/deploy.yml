name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # Firebase web client config is public (it ships in the client bundle);
        # security is enforced by Storage/Firestore rules, not by hiding these.
        env:
          VITE_FIREBASE_API_KEY: AIzaSyBwLL99C2wpc7wzj6ANTt2UW6LUNr3Yhp4
          VITE_FIREBASE_AUTH_DOMAIN: saferides-73eb2.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: saferides-73eb2
          VITE_FIREBASE_STORAGE_BUCKET: saferides-73eb2.firebasestorage.app

      - name: SPA fallback - copy index.html to 404.html
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


